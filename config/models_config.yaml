# Model Configurations
# This file defines all available models and their configurations

# Embedding Models
embedding_models:
  # OpenAI Embeddings
  openai_ada_002:
    provider: "openai"
    model_id: "text-embedding-ada-002"
    name: "OpenAI Ada-002"
    embedding_dimension: 1536
    batch_size: 100
    api_key_env: "OPENAI_API_KEY"
    api_base: "https://api.openai.com/v1"
    max_retries: 3
    timeout: 30
  
  openai_small_3:
    provider: "openai"
    model_id: "text-embedding-3-small"
    name: "OpenAI Small v3"
    embedding_dimension: 1536
    batch_size: 100
    api_key_env: "OPENAI_API_KEY"
    api_base: "https://api.openai.com/v1"
    max_retries: 3
    timeout: 30
  
  openai_large_3:
    provider: "openai"
    model_id: "text-embedding-3-large"
    name: "OpenAI Large v3"
    embedding_dimension: 3072
    batch_size: 50
    api_key_env: "OPENAI_API_KEY"
    api_base: "https://api.openai.com/v1"
    max_retries: 3
    timeout: 30
  
  # Hugging Face Embeddings
  hf_minilm:
    provider: "huggingface"
    model_id: "sentence-transformers/all-MiniLM-L6-v2"
    name: "MiniLM-L6-v2"
    embedding_dimension: 384
    batch_size: 32
    device: "cpu"  # cpu, cuda, mps
    normalize_embeddings: true
  
  hf_mpnet:
    provider: "huggingface"
    model_id: "sentence-transformers/all-mpnet-base-v2"
    name: "MPNet Base v2"
    embedding_dimension: 768
    batch_size: 16
    device: "cpu"
    normalize_embeddings: true
  
  hf_bge_small:
    provider: "huggingface"
    model_id: "BAAI/bge-small-en-v1.5"
    name: "BGE Small EN v1.5"
    embedding_dimension: 384
    batch_size: 32
    device: "cpu"
    normalize_embeddings: true
  
  hf_bge_base:
    provider: "huggingface"
    model_id: "BAAI/bge-base-en-v1.5"
    name: "BGE Base EN v1.5"
    embedding_dimension: 768
    batch_size: 16
    device: "cpu"
    normalize_embeddings: true
  
  hf_e5_large:
    provider: "huggingface"
    model_id: "intfloat/e5-large-v2"
    name: "E5 Large v2"
    embedding_dimension: 1024
    batch_size: 8
    device: "cpu"
    normalize_embeddings: true

# Language Models
language_models:
  # OpenAI Models
  openai_gpt_35_turbo:
    provider: "openai"
    model_id: "gpt-3.5-turbo"
    name: "GPT-3.5 Turbo"
    api_key_env: "OPENAI_API_KEY"
    api_base: "https://api.openai.com/v1"
    max_tokens: 2048
    temperature: 0.7
    top_p: 1.0
    frequency_penalty: 0.0
    presence_penalty: 0.0
    max_retries: 3
    timeout: 30
    stream: false
  
  openai_gpt_4:
    provider: "openai"
    model_id: "gpt-4"
    name: "GPT-4"
    api_key_env: "OPENAI_API_KEY"
    api_base: "https://api.openai.com/v1"
    max_tokens: 4096
    temperature: 0.7
    top_p: 1.0
    frequency_penalty: 0.0
    presence_penalty: 0.0
    max_retries: 3
    timeout: 30
    stream: false
  
  openai_gpt_4_turbo:
    provider: "openai"
    model_id: "gpt-4-turbo-preview"
    name: "GPT-4 Turbo"
    api_key_env: "OPENAI_API_KEY"
    api_base: "https://api.openai.com/v1"
    max_tokens: 4096
    temperature: 0.7
    top_p: 1.0
    frequency_penalty: 0.0
    presence_penalty: 0.0
    max_retries: 3
    timeout: 30
    stream: false
  
  # Anthropic Models
  anthropic_claude_3_sonnet:
    provider: "anthropic"
    model_id: "claude-3-sonnet-20240229"
    name: "Claude 3 Sonnet"
    api_key_env: "ANTHROPIC_API_KEY"
    api_base: "https://api.anthropic.com"
    max_tokens: 4096
    temperature: 0.7
    top_p: 1.0
    max_retries: 3
    timeout: 30
    stream: false
  
  anthropic_claude_3_haiku:
    provider: "anthropic"
    model_id: "claude-3-haiku-20240307"
    name: "Claude 3 Haiku"
    api_key_env: "ANTHROPIC_API_KEY"
    api_base: "https://api.anthropic.com"
    max_tokens: 4096
    temperature: 0.7
    top_p: 1.0
    max_retries: 3
    timeout: 30
    stream: false
  
  # Cohere Models
  cohere_command:
    provider: "cohere"
    model_id: "command"
    name: "Cohere Command"
    api_key_env: "COHERE_API_KEY"
    api_base: "https://api.cohere.ai/v1"
    max_tokens: 2048
    temperature: 0.7
    max_retries: 3
    timeout: 30
    stream: false
  
  # Local Models (via Ollama, LM Studio, etc.)
  local_llama_7b:
    provider: "local"
    model_id: "llama-7b-chat"
    name: "Local LLaMA 7B Chat"
    api_base: "http://localhost:8000"
    max_tokens: 2048
    temperature: 0.7
    top_p: 1.0
    max_retries: 3
    timeout: 30
    stream: false
  
  local_mistral_7b:
    provider: "local"
    model_id: "mistral-7b-instruct"
    name: "Local Mistral 7B Instruct"
    api_base: "http://localhost:8001"
    max_tokens: 2048
    temperature: 0.7
    top_p: 1.0
    max_retries: 3
    timeout: 30
    stream: false
  
  local_mixtral_8x7b:
    provider: "local"
    model_id: "mixtral-8x7b-instruct"
    name: "Local Mixtral 8x7B Instruct"
    api_base: "http://localhost:8002"
    max_tokens: 4096
    temperature: 0.7
    top_p: 1.0
    max_retries: 3
    timeout: 30
    stream: false

# Reranker Models
reranker_models:
  # Cohere Rerank
  cohere_rerank_english_v2:
    provider: "cohere"
    model_id: "rerank-english-v2.0"
    name: "Cohere Rerank English v2"
    api_key_env: "COHERE_API_KEY"
    api_base: "https://api.cohere.ai/v1"
    top_k: 10
    score_threshold: 0.5
    max_retries: 3
    timeout: 30
  
  cohere_rerank_multilingual_v2:
    provider: "cohere"
    model_id: "rerank-multilingual-v2.0"
    name: "Cohere Rerank Multilingual v2"
    api_key_env: "COHERE_API_KEY"
    api_base: "https://api.cohere.ai/v1"
    top_k: 10
    score_threshold: 0.5
    max_retries: 3
    timeout: 30
  
  # Local Rerankers
  local_cross_encoder:
    provider: "local"
    model_id: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    name: "Local Cross-Encoder"
    api_base: "http://localhost:8003"
    top_k: 10
    score_threshold: 0.5
    max_retries: 3
    timeout: 30

# Model Mappings and Defaults
model_mappings:
  # Default models for different use cases
  defaults:
    embedding: "openai_ada_002"  # Default embedding model
    llm: "openai_gpt_35_turbo"   # Default LLM
    reranker: "cohere_rerank_english_v2"  # Default reranker
  
  # Fast models (for development/testing)
  fast:
    embedding: "hf_minilm"
    llm: "openai_gpt_35_turbo"
  
  # High-quality models (for production)
  high_quality:
    embedding: "openai_large_3"
    llm: "openai_gpt_4_turbo"
    reranker: "cohere_rerank_english_v2"
  
  # Local models (offline use)
  local:
    embedding: "hf_bge_small"
    llm: "local_mistral_7b"
  
  # Cost-effective models
  cost_effective:
    embedding: "hf_minilm"
    llm: "openai_gpt_35_turbo"

# Model Capabilities
model_capabilities:
  # Models that support streaming
  streaming_support:
    - "openai_gpt_35_turbo"
    - "openai_gpt_4"
    - "openai_gpt_4_turbo"
    - "anthropic_claude_3_sonnet"
    - "anthropic_claude_3_haiku"
    - "local_llama_7b"
    - "local_mistral_7b"
    - "local_mixtral_8x7b"
  
  # Models that support function calling
  function_calling_support:
    - "openai_gpt_35_turbo"
    - "openai_gpt_4"
    - "openai_gpt_4_turbo"
    - "anthropic_claude_3_sonnet"
  
  # Models with larger context windows
  large_context:
    - "openai_gpt_4_turbo"
    - "anthropic_claude_3_sonnet"
    - "local_mixtral_8x7b"
  
  # Multilingual models
  multilingual:
    - "openai_large_3"
    - "cohere_rerank_multilingual_v2"
    - "hf_e5_large"
